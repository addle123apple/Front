<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母聽力練習 5.0</title>
    <style>
        :root {
            --bg: #f0f9ff;
            --card: #ffffff;
            --primary: #6c5ce7;
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: var(--bg);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        #fireworks-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #game-container {
            position: relative; z-index: 5;
            width: 85%; max-width: 450px;
            background: var(--card); padding: 35px 20px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px #cbd5e1, -20px -20px 60px #ffffff;
            text-align: center;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card); border-radius: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }

        .start-btn {
            background: #6c5ce7; color: white; border: none; padding: 25px 60px;
            font-size: 28px; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        .score-display { font-size: 20px; color: #94a3b8; font-weight: bold; margin-bottom: 10px; }

        .audio-btn {
            margin: 10px auto 30px;
            padding: 25px; background: #f8fafc;
            border-radius: 50%; width: 90px; height: 90px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 6px 6px 12px #cbd5e1, -6px -6px 12px #ffffff;
            cursor: pointer;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .letter-card {
            aspect-ratio: 1 / 1; background: #ffffff; border: none; border-radius: 30px;
            font-size: 85px; font-weight: bold;
            box-shadow: 8px 8px 16px #cbd5e1, -8px -8px 16px #ffffff;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }

        .c0 { color: #3b82f6; } .c1 { color: #ef4444; }
        .c2 { color: #10b981; } .c3 { color: #f59e0b; }

        @keyframes success { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .correct { animation: success 0.5s ease; border: 5px solid #10b981; }
    </style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div id="game-container">
    <div id="start-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🎮</div>
        <button class="start-btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div class="score-display">答對次數：<span id="score">0</span></div>
    
    <div class="audio-btn" onclick="playQuestion()">
        <span style="font-size: 50px;">🔊</span>
    </div>

    <div class="options-grid" id="letters"></div>
</div>

<script>
    const alphabet = "abcdefghijklmnopqrstuvwxyz".split(""); // 這裡全部用小寫存
    let targetLetter = "";
    let score = 0;

    function say(text, isLetter = false) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US'; 
        
        if (isLetter) {
            // 【核心修正】強制將唸出來的文字轉為小寫，這會跳過 Safari 的 "Capital" 讀法
            msg.text = text.toLowerCase();
            msg.rate = 0.35; // 字母唸超慢
        } else {
            msg.rate = 0.55; // 一般對話語速
        }
        
        msg.pitch = 1.0; 
        window.speechSynthesis.speak(msg);
    }

    function playQuestion() {
        say("Which letter is");
        
        // 延遲 1.5 秒，給小朋友緩衝
        setTimeout(() => {
            // 這裡傳入 true，啟動強制小寫唸法
            say(targetLetter, true);
        }, 1500);
    }

    // --- 煙火粒子 ---
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let parts = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    function createFire(x, y) {
        for (let i = 0; i < 40; i++) {
            parts.push({ x, y, c: `hsl(${Math.random()*360}, 70%, 60%)`, v: { x: (Math.random()-0.5)*12, y: (Math.random()-0.5)*12 }, a: 1 });
        }
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        parts = parts.filter(p => p.a > 0);
        parts.forEach(p => {
            ctx.globalAlpha = p.a; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill(); p.x += p.v.x; p.y += p.v.y; p.a -= 0.02;
        });
        requestAnimationFrame(draw);
    }
    draw();

    // --- 遊戲邏輯 ---
    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        nextLevel();
    }

    function nextLevel() {
        // 隨機選一個小寫字母作為底稿
        const baseChar = alphabet[Math.floor(Math.random() * alphabet.length)];
        
        // 畫面上顯示的字母（隨機大寫或小寫）
        targetLetter = Math.random() > 0.5 ? baseChar.toUpperCase() : baseChar;

        let others = alphabet.filter(c => c !== baseChar).sort(() => 0.5 - Math.random()).slice(0, 3);
        let choices = [targetLetter, ...others.map(c => Math.random() > 0.5 ? c.toUpperCase() : c)].sort(() => 0.5 - Math.random());

        const box = document.getElementById('letters');
        box.innerHTML = '';

        choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `letter-card c${i}`;
            btn.innerText = c;
            btn.onclick = () => {
                // 比較時不分大小寫
                if (c.toLowerCase() === targetLetter.toLowerCase()) {
                    score++;
                    document.getElementById('score').innerText = score;
                    createFire(window.innerWidth/2, window.innerHeight/2);
                    btn.classList.add('correct');
                    say("Great");
                    setTimeout(nextLevel, 1800);
                } else {
                    say("Try again", false);
                }
            };
            box.appendChild(btn);
        });
        setTimeout(playQuestion, 600);
    }
</script>

</body>
</html>
