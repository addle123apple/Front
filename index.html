<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>字母練習-離線版</title>
    <style>
        :root { --bg: #fdfcf0; --card: #ffffff; --primary: #6c5ce7; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #fireworks-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #game-container { position: relative; z-index: 5; width: 85%; max-width: 450px; background: var(--card); padding: 35px 20px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); border-radius: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn { background: #6c5ce7; color: white; border: none; padding: 25px 60px; font-size: 28px; font-weight: bold; border-radius: 50px; cursor: pointer; }
        .score-display { font-size: 18px; color: #94a3b8; margin-bottom: 10px; }
        .audio-btn { margin: 10px auto 30px; padding: 25px; background: #f1f2f6; border-radius: 50%; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; box-shadow: 4px 4px 10px #ddd; cursor: pointer; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .letter-card { aspect-ratio: 1 / 1; background: #ffffff; border: none; border-radius: 30px; font-size: 80px; font-weight: bold; box-shadow: 5px 5px 15px #eee; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .c0 { color: #54a0ff; } .c1 { color: #ff6b6b; } .c2 { color: #1dd1a1; } .c3 { color: #feca57; }
        @keyframes success { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .correct { animation: success 0.5s ease; border: 5px solid #1dd1a1; }
    </style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div id="game-container">
    <div id="start-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🏠</div>
        <button class="start-btn" onclick="startGame()">點我開始</button>
        <p style="color: #94a3b8; font-size: 14px; margin-top: 15px;">※ 離線前請先在有網路時開啟一次</p>
    </div>
    <div class="score-display">得分：<span id="score">0</span></div>
    <div class="audio-btn" onclick="playQuestion()">
        <span style="font-size: 40px;">🔊</span>
    </div>
    <div class="options-grid" id="letters"></div>
</div>

<script>
    const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
    let targetLetter = "";
    let score = 0;
    const synth = window.speechSynthesis;

    // 【離線關鍵】預載入本地人聲
    let voices = [];
    function getLocalVoice() {
        voices = synth.getVoices();
        // 優先尋找系統內建(本地)的美式英語人聲，避開需要連網的 Google 人聲
        return voices.find(v => v.lang.includes('en-US') && v.localService === true) || 
               voices.find(v => v.lang.includes('en')) || 
               null;
    }

    // 某些瀏覽器需要這行來觸發人聲載入
    synth.onvoiceschanged = getLocalVoice;

    function say(text, isLetter = false) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text.toLowerCase());
        msg.lang = 'en-US';
        msg.voice = getLocalVoice(); // 強制使用剛才找到的本地人聲
        msg.rate = isLetter ? 0.35 : 0.6;
        msg.pitch = 1.0;
        synth.speak(msg);
    }

    function playQuestion() {
        say("Which letter is");
        setTimeout(() => { say(targetLetter, true); }, 1300);
    }

    // --- 煙火粒子 (維持原樣) ---
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let parts = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    function createFire(x, y) {
        for (let i = 0; i < 30; i++) {
            parts.push({ x, y, c: `hsl(${Math.random()*360}, 70%, 60%)`, v: { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10 }, a: 1 });
        }
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        parts = parts.filter(p => p.a > 0);
        parts.forEach(p => { ctx.globalAlpha = p.a; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fillStyle = p.c; ctx.fill(); p.x += p.v.x; p.y += p.v.y; p.a -= 0.02; });
        requestAnimationFrame(draw);
    }
    draw();

    // --- 遊戲邏輯 ---
    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        nextLevel();
    }

    function nextLevel() {
        const baseChar = alphabet[Math.floor(Math.random() * alphabet.length)];
        targetLetter = Math.random() > 0.5 ? baseChar.toUpperCase() : baseChar;
        let others = alphabet.filter(c => c !== baseChar).sort(() => 0.5 - Math.random()).slice(0, 3);
        let choices = [targetLetter, ...others.map(c => Math.random() > 0.5 ? c.toUpperCase() : c)].sort(() => 0.5 - Math.random());
        const box = document.getElementById('letters');
        box.innerHTML = '';
        choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `letter-card c${i}`;
            btn.innerText = c;
            btn.onclick = () => {
                if (c.toLowerCase() === targetLetter.toLowerCase()) {
                    score++;
                    document.getElementById('score').innerText = score;
                    createFire(window.innerWidth/2, window.innerHeight/2);
                    btn.classList.add('correct');
                    say("Great");
                    setTimeout(nextLevel, 1600);
                } else {
                    say("Try again");
                }
            };
            box.appendChild(btn);
        });
        setTimeout(playQuestion, 600);
    }
</script>

</body>
</html>
